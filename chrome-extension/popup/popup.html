<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dabba AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app" class="popup-container">
    <header class="popup-header">
      <div class="header-left">
        <span class="logo">◆</span>
        <h1 class="title">dabba</h1>
      </div>
      <div class="header-right">
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        <button id="sidebarBtn" class="icon-btn" title="Open Sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="popup-body">
      <div class="model-selector">
        <label for="modelSelect">Model</label>
        <select id="modelSelect">
          <option value="dabba">dabba</option>
        </select>
      </div>

      <div class="quick-input-area">
        <textarea
          id="quickInput"
          class="quick-input"
          placeholder="Ask dabba anything..."
          rows="3"
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <div id="responseArea" class="response-area hidden">
        <div class="response-content" id="responseContent"></div>
        <button id="copyResponseBtn" class="text-btn">Copy</button>
      </div>

      <div class="recent-section">
        <h2 class="section-title">Recent Conversations</h2>
        <div id="recentList" class="recent-list">
          <p class="empty-state">No conversations yet</p>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Ready</span>
      <button id="toggleThemeBtn" class="icon-btn" title="Toggle theme">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>

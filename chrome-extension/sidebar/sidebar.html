<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dabba Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app" class="sidebar-container">
    <!-- Header -->
    <header class="sidebar-header">
      <div class="header-left">
        <span class="logo">◆</span>
        <h1 class="title">dabba</h1>
      </div>
      <div class="header-right">
        <button id="newChatBtn" class="icon-btn" title="New chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page Context Bar -->
    <div id="pageContextBar" class="page-context-bar hidden">
      <div class="context-info">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span id="pageContextText" class="context-text">Reading current page</span>
      </div>
      <button id="clearContextBtn" class="icon-btn small" title="Clear context">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Chat Messages -->
    <div id="chatMessages" class="chat-messages">
      <div class="welcome-screen">
        <div class="welcome-icon">◆</div>
        <h2 class="welcome-title">dabba AI Assistant</h2>
        <p class="welcome-text">Ask me anything about this page, or start a new conversation.</p>
        <div class="suggestions">
          <button class="suggestion-chip" data-prompt="Summarize this page">Summarize this page</button>
          <button class="suggestion-chip" data-prompt="What is this page about?">What is this page about?</button>
          <button class="suggestion-chip" data-prompt="Extract key points from this page">Extract key points</button>
          <button class="suggestion-chip" data-prompt="Explain the main concepts here">Explain main concepts</button>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div id="fileDropZone" class="file-drop-zone hidden">
        <p>Drop files here or click to upload</p>
      </div>
      <div class="input-toolbar">
        <button id="fileUploadBtn" class="icon-btn" title="Attach file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <button id="contextToggleBtn" class="icon-btn" title="Include page context">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </button>
        <input type="file" id="fileInput" class="file-input hidden" multiple accept=".txt,.md,.pdf,.json,.csv,.js,.ts,.py,.jsx,.tsx,.html,.css">
      </div>
      <div class="input-row">
        <textarea
          id="chatInput"
          class="chat-input"
          placeholder="Ask dabba..."
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div id="filePreview" class="file-preview hidden"></div>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <h3>Settings</h3>
        <button id="closeSettingsBtn" class="icon-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <label for="sidebarModelSelect">Model</label>
          <select id="sidebarModelSelect">
            <option value="dabba">dabba</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="temperatureRange">Temperature</label>
          <div class="range-row">
            <input type="range" id="temperatureRange" min="0" max="2" step="0.1" value="0.7">
            <span id="temperatureValue" class="range-value">0.7</span>
          </div>
        </div>
        <div class="setting-group">
          <label for="maxTokensRange">Max tokens</label>
          <div class="range-row">
            <input type="range" id="maxTokensRange" min="256" max="8192" step="256" value="4096">
            <span id="maxTokensValue" class="range-value">4096</span>
          </div>
        </div>
        <div class="setting-group">
          <label>Theme</label>
          <div class="theme-buttons">
            <button class="theme-btn" data-theme="light">Light</button>
            <button class="theme-btn" data-theme="dark">Dark</button>
            <button class="theme-btn" data-theme="system">System</button>
          </div>
        </div>
        <div class="settings-actions">
          <button id="exportBtn" class="action-btn">Export conversations</button>
          <button id="clearConvoBtn" class="action-btn danger">Clear all chats</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidebar.js" type="module"></script>
</body>
</html>

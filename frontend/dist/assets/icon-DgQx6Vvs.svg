<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f3e8ff" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cffafe" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neonGlow)" style="mix-blend-mode: screen;">
    <ellipse cx="50" cy="42" rx="22" ry="14" transform="rotate(30 50 42)" stroke="url(#greenGrad)" stroke-width="7.5" stroke-linecap="round" opacity="0.85" />
    <ellipse cx="42" cy="58" rx="22" ry="14" transform="rotate(150 42 58)" stroke="url(#purpleGrad)" stroke-width="7.5" stroke-linecap="round" opacity="0.85" />
    <ellipse cx="58" cy="58" rx="22" ry="14" transform="rotate(270 58 58)" stroke="url(#cyanGrad)" stroke-width="7.5" stroke-linecap="round" opacity="0.85" />
  </g>
</svg>

# dabba training configuration - Tiny model (10M params)
# Usage: python -m dabba.scripts.train --config configs/train_tiny.yaml

model:
  hidden_size: 256
  num_layers: 6
  num_attention_heads: 8
  num_key_value_heads: 4
  intermediate_size: 768
  vocab_size: 32000
  max_position_embeddings: 2048
  hidden_act: silu
  rms_norm_eps: 1.0e-6
  use_rms_norm: true
  pre_norm: true
  rope_theta: 10000.0
  tie_word_embeddings: true
  embedding_dropout: 0.1
  attention_dropout: 0.0
  ffn_dropout: 0.0
  use_flash_attention: false
  use_sdpa: true

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  epsilon: 1.0e-8
  max_grad_norm: 1.0
  lr_scheduler: cosine
  warmup_steps: 2000
  lr_min_ratio: 0.1
  num_epochs: 1
  max_steps: 100000
  batch_size: 32
  gradient_accumulation_steps: 1
  seq_length: 2048
  use_amp: true
  amp_dtype: bfloat16
  use_torch_compile: false
  save_steps: 1000
  save_total_limit: 5
  output_dir: ./checkpoints/tiny
  eval_steps: 500
  eval_iters: 100
  early_stopping_patience: null
  log_steps: 10
  seed: 42
  num_workers: 4

data:
  train_data_path: ./data/train
  eval_data_path: ./data/eval
  clean_text: true
  min_text_length: 50
  remove_html: true
  remove_urls: true
  remove_extra_whitespace: true
  normalize_unicode: true
  deduplicate: true
  dedup_method: exact
  chunk_size: 2048
  chunk_overlap: 64
  streaming: true
  shuffle_buffer_size: 10000
  pack_sequences: true
  vocab_size: 32000
